<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Híbridos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.1/css/swiper.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-12">

                <div class="gallery">        
                    <div class="swiper-container gallery-slider">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide"><img src="LoboSol.jpg" alt="Lobo Sol"></div>
                            <div class="swiper-slide"><img src="Mono.jpg" alt="Mono"></div>
                            <div class="swiper-slide"><img src="MoR.jpg" alt="MoR"></div>
                            <div class="swiper-slide"><img src="Ric.jpg" alt="Ric"></div>
                            <div class="swiper-slide"><img src="CJ.jpg" alt="CJ"></div>
                            <div class="swiper-slide"><img src="Dios.jpg" alt="Dios"></div>
                        </div>
                        <div class="swiper-button-prev"></div>
                        <div class="swiper-button-next"></div>
                    </div>

                    <div class="swiper-container gallery-thumbs">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide"><img src="LoboSol.jpg" alt="Lobo Sol"></div>
                            <div class="swiper-slide"><img src="Mono.jpg" alt="Mono"></div>
                            <div class="swiper-slide"><img src="MoR.jpg" alt="MoR"></div>
                            <div class="swiper-slide"><img src="Ric.jpg" alt="Ric"></div>
                            <div class="swiper-slide"><img src="CJ.jpg" alt="CJ"></div>
                            <div class="swiper-slide"><img src="Dios.jpg" alt="Dios"></div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-outline-light btn-sm px-4" onclick="window.close()">Cerrar Galería</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.1/js/swiper.min.js"></script>
    <script src="scroll.js"></script>
</body>
</html>
